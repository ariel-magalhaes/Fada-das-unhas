<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Fada das Unhas Esmalteria</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <main class="admin-page">
    <section class="admin-shell">
      <div class="admin-header">
        <div>
          <p class="eyebrow">Painel administrativo</p>
          <h1>Fada das Unhas Esmalteria</h1>
          <p class="sub">
            Gerencie agendamentos, status e confirme atendimentos.
          </p>
        </div>
        <button id="btnLogout" class="ghost-btn hidden">Sair</button>
      </div>

      <section id="loginCard" class="card">
        <h2>Entrar no painel</h2>
        <div class="field">
          <label for="adminEmail">E-mail</label>
          <input type="email" id="adminEmail" placeholder="Digite seu e-mail" />
        </div>
        <div class="field">
          <label for="adminSenha">Senha</label>
          <input type="password" id="adminSenha" placeholder="Digite sua senha" />
        </div>
        <p id="loginErro" class="error-text"></p>
        <button id="btnLogin" class="primary-btn">Entrar</button>
      </section>

      <section id="painelCard" class="card hidden">
        <div class="toolbar">
          <div class="field">
            <label for="filtroData">Filtrar por data</label>
            <input type="date" id="filtroData" />
          </div>

          <div class="field">
            <label for="filtroStatus">Filtrar por status</label>
            <select id="filtroStatus">
              <option value="">Todos</option>
              <option value="pendente">Pendente</option>
              <option value="confirmado">Confirmado</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>
        </div>

        <div class="summary">
          <div class="summary-box">
            <span>Total</span>
            <strong id="totalAgendamentos">0</strong>
          </div>
          <div class="summary-box">
            <span>Pendentes</span>
            <strong id="totalPendentes">0</strong>
          </div>
          <div class="summary-box">
            <span>Confirmados</span>
            <strong id="totalConfirmados">0</strong>
          </div>
          <div class="summary-box">
            <span>Cancelados</span>
            <strong id="totalCancelados">0</strong>
          </div>
        </div>

        <div id="listaAgendamentos" class="lista-agendamentos"></div>
      </section>
    </section>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
